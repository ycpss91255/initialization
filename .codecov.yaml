# .codecov.yaml — Codecov configuration for init_ubuntu
#
# Borrowed from ycpss91255-docker/base v0.28.0 (commit ade915a) .codecov.yaml
# Customizations vs upstream:
#   - target changed from "auto" to "80%" (PRD G5: v0.1 起始覆蓋率 80%)
#   - ignore[] expanded to cover small-tools/ (deprecated, PRD §6.6) and
#     module/tools/ (pending relocation, PRD §6.5) so they don't drag the
#     headline number down before they're modernized

coverage:
  status:
    project:
      default:
        # v0.1 floor: 80% (PRD G5 / AC-17)
        # Roadmap: 90% at v0.5, 95% at v1.0, 99% from there
        # See docs/architecture.md §8.4 Coverage gate
        target: 80%
        threshold: 1%
    patch:
      default:
        # Patch coverage is reported but never blocks merges.
        # Bash branches (case ;; arms, fallback guards) are commonly not
        # exercised intentionally, and refactor PRs that only move covered
        # code around would otherwise be blocked. The project-level status
        # above still guards against regressions.
        informational: true

ignore:
  - "test/**/*"
  - ".github/**/*"
  - "small-tools/**/*"
  - "module/tools/**/*"
  - "dockerfile/**/*"
  - "template/**/*"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
