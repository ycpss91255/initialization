# .github/workflows/ci.yaml — init_ubuntu CI
#
# Aligns with ycpss91255-docker/docker_harness CI conventions:
# - All test workflows run inside Docker (ADR-0004 hard rule).
# - Path-filtered: doc-only / meta-only PRs (doc/, *.md, .claude/, GH
#   issue templates, …) skip test/coverage; lint still runs.
# - Job names match justfile.ci recipe names so `required_status_checks`
#   can pin them by name (see issue #3).
# - test-tools image is built ONCE in `build-image` (BuildKit + GHA
#   cache), exported as a tar artifact, and `docker load`-ed by the
#   downstream jobs instead of each job cold-building it (issue #26).
# - Integration tests fan out over the Ubuntu version matrix — the matrix
#   dimension is the DOCKER IMAGE (ubuntu:22.04 / 24.04 / 26.04), not the
#   GHA runner version (issue #29; PRD §11.1, AC-3 / AC-18).
#
# Triggers:
#   - PRs to main (the primary gating path)
#   - Pushes to main (final safety net; matches what gets tagged)
#   - Tag pushes vX.Y.Z* (so release-tag.sh's CI conclusion query works)

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

# Cancel in-flight runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  # ── Path filter ────────────────────────────────────────────────────────────
  # Detect whether the change is doc-only / meta-only. Other jobs key on
  # this to skip heavy work for pure markdown / license / agent-config
  # updates (issue #27).
  changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      # JSON array of matched per-module filter names (e.g.
      # ["shared","module-docker","core"]); consumed by `discover` to
      # narrow the test-unit matrix on PRs (issue #31).
      changed: ${{ steps.module-filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          # The filter below is all-negated, so it needs `every`: a file
          # counts as `code` only when EVERY '!' pattern matches it, i.e.
          # no exclusion applies. The default (`some`) would flag almost
          # every file as `code` (any file outside ONE exclusion matches
          # that negation) — see dorny/paths-filter#167.
          predicate-quantifier: 'every'
          # `code` = anything that could affect runtime behaviour:
          # everything not excluded below — lib/, module/, script/,
          # template/, test/, small-tools/, dockerfile/, compose.yaml,
          # justfile / justfile.ci, .github/workflows/, … (all-singular
          # dirs, ADR-0021).
          # Doc-only / meta-only = `code` false → heavy jobs skip;
          # ci-passed treats their `skipped` result as pass.
          filters: |
            code:
              - '!doc/**'
              - '!**/*.md'
              - '!**/*.adoc'
              - '!LICENSE'
              - '!LICENSE.*'
              - '!.gitignore'
              - '!.codecov.yaml'
              - '!.claude/**'
              - '!.github/ISSUE_TEMPLATE/**'
      # Per-module filters (issue #31): generated at runtime from
      # module/*.module.sh so adding a module never requires a workflow
      # edit. Separate paths-filter step because these are positive
      # filters and need the default `some` quantifier (the `code`
      # filter above is all-negated and needs `every`).
      - name: generate per-module path filters
        run: |
          ./script/ci/generate_module_filters.sh \
            > /tmp/module-filters.generated.yaml
          echo '── generated filters ──'
          cat /tmp/module-filters.generated.yaml
      - id: module-filter
        uses: dorny/paths-filter@v3
        with:
          filters: /tmp/module-filters.generated.yaml

  # ── Discover unit-test matrix (issue #31, PRD M10) ─────────────────────────
  # Lists module/*.module.sh and intersects with the matched path filters:
  # PRs only run the jobs for changed modules (+ `core` for non-module
  # specs); push to main / tags runs the full matrix. A code change that
  # matches no known filter falls back to the full matrix (never silently
  # skip unit tests).
  discover:
    name: discover-modules
    needs: changes
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.select.outputs.modules }}
      core: ${{ steps.select.outputs.core }}
      # true iff the selection is the full cartesian (every module +
      # core). The coverage job keys gate enforcement on this (issue
      # #28): narrow PR matrices merge to a structurally low number, so
      # they get a report-only gate.
      full: ${{ steps.select.outputs.full }}
    steps:
      - uses: actions/checkout@v4
      - id: select
        env:
          EVENT_NAME: ${{ github.event_name }}
          CHANGED_FILTERS: ${{ needs.changes.outputs.changed }}
        run: |
          ./script/ci/select_unit_matrix.sh \
            --event "${EVENT_NAME}" \
            --changed "${CHANGED_FILTERS:-[]}" \
            | tee -a "$GITHUB_OUTPUT"

  # ── Build test-tools image once (issue #26) ────────────────────────────────
  # Always runs (no path filter) because lint runs on every PR, including
  # doc-only ones, and lint needs the image. GHA layer cache makes the
  # doc-only case near-instant after the first build on a ref.
  build-image:
    name: build-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3
      # Content-keyed tag (issue #113): downstream jobs re-resolve the
      # same tag from the same checkout via justfile.ci, so the loaded
      # image matches without passing the tag between jobs.
      - name: resolve content-keyed image tag
        id: tag
        run: echo "tag=$(./script/ci/resolve_test_tools_tag.sh)" >> "$GITHUB_OUTPUT"
      - name: build test-tools image (GHA cache + tar export)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfile/Dockerfile.test-tools
          tags: ${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/test-tools.tar
      - name: upload test-tools image artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-tools-image
          path: /tmp/test-tools.tar
          retention-days: 1

  # ── Build kcov-tools image once (issue #226) ───────────────────────────────
  # The coverage path (core sub-shards + per-module matrix + merge) runs in
  # the baked kcov image (kcov/kcov + the bats toolchain —
  # dockerfile/Dockerfile.kcov-tools). Building + exporting it once here,
  # then `docker load`-ing it in the kcov jobs, makes ci.sh
  # `_install_deps_for_coverage` early-return via `command -v bats` instead
  # of apt-installing ~30 packages (+ git-cloning bats-mock) on EVERY shard
  # (~20-30s/shard). Same build-once + tar-artifact pattern as build-image
  # (issue #26). Content-keyed tag (issue #226) re-resolved by downstream
  # jobs from the same checkout via justfile.ci.
  build-kcov-image:
    name: build-kcov-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3
      - name: resolve content-keyed kcov-tools image tag
        id: tag
        run: echo "tag=$(./script/ci/resolve_kcov_tools_tag.sh)" >> "$GITHUB_OUTPUT"
      - name: build kcov-tools image (GHA cache + tar export)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfile/Dockerfile.kcov-tools
          tags: ${{ steps.tag.outputs.tag }}
          cache-from: type=gha,scope=kcov-tools
          cache-to: type=gha,mode=max,scope=kcov-tools
          outputs: type=docker,dest=/tmp/kcov-tools.tar
      - name: upload kcov-tools image artifact
        uses: actions/upload-artifact@v4
        with:
          name: kcov-tools-image
          path: /tmp/kcov-tools.tar
          retention-days: 1

  # ── Lint (always runs, including doc-only PRs) ─────────────────────────────
  lint:
    name: lint
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: download test-tools image artifact
        uses: actions/download-artifact@v4
        with:
          name: test-tools-image
          path: /tmp
      - name: load test-tools image
        run: docker load -i /tmp/test-tools.tar
      - name: set up just
        uses: extractions/setup-just@v3
      - name: run lint (shellcheck + hadolint + fish syntax)
        run: TEST_TOOLS_PREBUILT=1 just -f justfile.ci lint

  # ── Unit tests: core sub-shard matrix (non-module specs; #31 + #28 + #226) ─
  # Engine / lib / hook / script / template specs, split into a 4-way
  # round-robin matrix (issue #226) so the ~1000 non-module specs run as
  # FOUR parallel kcov jobs instead of one ~242s serial shard. ci.sh's
  # `--module core-<N>` partitions the sorted core spec list round-robin
  # (CORE_SHARD_COUNT=4); each shard writes coverage/shard-core-<N>, and the
  # coverage-merge job consumes coverage/shard-* unchanged. Smaller shards
  # also lower kcov ptrace fork-density (mitigates the intermittent deadlock
  # seen on the full core shard). Skipped on doc-only changes and on PRs
  # that only touch modules.
  #
  # Issue #28: bats runs ONCE, under kcov (`just -f justfile.ci
  # coverage-unit`) — these jobs are both the unit-test gate and the
  # coverage producer for their shard. They run in the baked kcov-tools
  # image (issue #226: kcov/kcov + bats toolchain), loaded from the
  # build-kcov-image artifact; KCOV_TOOLS_PREBUILT=1 skips the local rebuild
  # and TEST_TOOLS_PREBUILT=1 skips the (unused) test-tools rebuild.
  test-unit-core:
    name: test-unit (core-${{ matrix.core-shard }})
    needs: [changes, discover, build-kcov-image]
    if: >-
      needs.changes.outputs.code == 'true' &&
      needs.discover.outputs.core == 'true'
    strategy:
      fail-fast: false
      matrix:
        core-shard: ['0', '1', '2', '3']
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CORE_SHARD_COUNT: '4'
    steps:
      - uses: actions/checkout@v4
      - name: download kcov-tools image artifact
        uses: actions/download-artifact@v4
        with:
          name: kcov-tools-image
          path: /tmp
      - name: load kcov-tools image
        run: docker load -i /tmp/kcov-tools.tar
      - name: set up just
        uses: extractions/setup-just@v3
      - name: run core sub-shard unit bats specs once under kcov
        env:
          CORE_SHARD: ${{ matrix.core-shard }}
        run: |
          TEST_TOOLS_PREBUILT=1 KCOV_TOOLS_PREBUILT=1 \
            just -f justfile.ci coverage-unit "core-${CORE_SHARD}"
      - name: upload coverage shard
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shard-core-${{ matrix.core-shard }}
          path: coverage/shard-core-${{ matrix.core-shard }}/
          if-no-files-found: ignore
          retention-days: 1

  # ── Unit tests: per-module matrix (issue #31, PRD M10; #28 kcov) ───────────
  # One shard per module from the discover job. PRs get only the shards
  # for changed modules; push to main / tags gets the full matrix. A
  # module without a spec yet is a green skip inside ci.sh (then no shard
  # dir exists — hence if-no-files-found: ignore). Empty matrix (e.g.
  # core-only PR) skips the whole job — ci-passed counts skipped as pass.
  # Like test-unit-core, runs bats ONCE under kcov in the baked kcov-tools
  # image (issue #226), loaded from the build-kcov-image artifact.
  test-unit-module:
    name: test-unit (${{ matrix.module }})
    needs: [changes, discover, build-kcov-image]
    if: >-
      needs.changes.outputs.code == 'true' &&
      needs.discover.outputs.modules != '[]'
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover.outputs.modules) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: download kcov-tools image artifact
        uses: actions/download-artifact@v4
        with:
          name: kcov-tools-image
          path: /tmp
      - name: load kcov-tools image
        run: docker load -i /tmp/kcov-tools.tar
      - name: set up just
        uses: extractions/setup-just@v3
      - name: run module unit bats spec once under kcov
        env:
          MODULE: ${{ matrix.module }}
        run: |
          TEST_TOOLS_PREBUILT=1 KCOV_TOOLS_PREBUILT=1 \
            just -f justfile.ci coverage-unit "${MODULE}"
      - name: upload coverage shard
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shard-${{ matrix.module }}
          path: coverage/shard-${{ matrix.module }}/
          if-no-files-found: ignore
          retention-days: 1

  # ── Integration tests: Ubuntu version matrix (issue #29; AC-3 / AC-18) ─────
  # PRD §11.1 (2026-06-06 定稿): the matrix dimension is the DOCKER IMAGE
  # (`ubuntu:22.04` / `24.04` / `26.04`), NOT the GHA runner version —
  # tests run inside containers per ADR-0004, so the runner is pinned to
  # stable `ubuntu-24.04` and `ubuntu-26.04` runner GA status is
  # irrelevant. 26.04 is mandatory from day one: no `continue-on-error`
  # on any shard (AC-3 / AC-18 carry no exemption). Skipped on doc-only
  # changes like the other heavy jobs.
  #
  # Issue #175/#176: this matrix now also runs the real engine-lifecycle
  # harness (test/integration/lifecycle/engine_lifecycle_spec.bats) — a
  # NON-ROOT user driving the REAL non-dry-run setup_ubuntu.sh per archetype
  # (github-release full incl. upgrade/Sidecar bump; config + custom full;
  # apt reduced) with ONLY the github-release fetch stubbed offline. Because
  # AC-1/2/3 base-install now exercises a github-release-archetype module
  # across all three ubuntu shards, the engine wiring the #174 bug broke is
  # asserted on 22.04/24.04/26.04. INIT_UBUNTU_TEST_IMAGE (set below) is
  # forwarded into the container by script/ci/ci.sh so the harness can record
  # which matrix target each shard stands in for.
  test-integration:
    name: test-integration (ubuntu:${{ matrix.ubuntu }})
    needs: [changes, build-image]
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        ubuntu: ['22.04', '24.04', '26.04']
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: download test-tools image artifact
        uses: actions/download-artifact@v4
        with:
          name: test-tools-image
          path: /tmp
      - name: load test-tools image
        run: docker load -i /tmp/test-tools.tar
      - name: set up just
        uses: extractions/setup-just@v3
      # The shard's matrix image must exist AND boot on the 24.04 runner
      # (PRD §11.1 transition concern: 26.04 container on a 24.04 host).
      # Asserting /etc/os-release pins each shard to its real image —
      # three genuinely distinct containers, not three identical runs.
      - name: pull + verify matrix image ubuntu:${{ matrix.ubuntu }}
        env:
          UBUNTU_IMAGE: ubuntu:${{ matrix.ubuntu }}
          UBUNTU_EXPECTED: ${{ matrix.ubuntu }}
        run: |
          docker pull "${UBUNTU_IMAGE}"
          docker run --rm -e EXPECTED="${UBUNTU_EXPECTED}" "${UBUNTU_IMAGE}" \
            bash -ec '. /etc/os-release
                      echo "image reports VERSION_ID=${VERSION_ID}"
                      test "${VERSION_ID}" = "${EXPECTED}"'
      - name: run integration bats specs (ubuntu:${{ matrix.ubuntu }} shard)
        env:
          # Contract var for the M11 install-cycle specs (PRD §12 M11 /
          # doc/TESTING.md §3 matrix/): they run the real install cycle
          # inside this image. Exported now so landing those specs needs
          # no workflow change.
          INIT_UBUNTU_TEST_IMAGE: ubuntu:${{ matrix.ubuntu }}
        run: TEST_TOOLS_PREBUILT=1 just -f justfile.ci test-integration

  # ── Coverage aggregation (issue #28; skipped on doc-only changes) ──────────
  # The unit shards above already ran bats under kcov — no second bats
  # run here. This job downloads every per-shard kcov output, merges
  # them (`kcov --merge`), and asserts the coverage gate on the MERGED
  # result — never per shard. Gate threshold is COVERAGE_MIN (default 80
  # — the AC-17 gate, ratcheted up from the 66 baseline in #124 after
  # #122/#123/#153 lifted the merged number to 80.16%). Enforcement only happens on
  # full-matrix runs (discover.full): narrow PR matrices merge to a
  # structurally low number (unrun shards' source files still count in
  # the denominator), so those runs print the percentage report-only.
  # Zero downloaded shards (every selected shard was a spec-less green
  # skip) is itself a green skip inside ci.sh. Runs after the shards but
  # tolerates skipped ones (e.g. module-only PRs skip test-unit-core),
  # hence `!cancelled()` + explicit result checks instead of plain needs
  # gating.
  coverage:
    name: coverage
    needs: [changes, discover, build-kcov-image, test-unit-core, test-unit-module]
    if: >-
      !cancelled() &&
      needs.changes.outputs.code == 'true' &&
      needs.test-unit-core.result != 'failure' &&
      needs.test-unit-core.result != 'cancelled' &&
      needs.test-unit-module.result != 'failure' &&
      needs.test-unit-module.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: download kcov-tools image artifact
        uses: actions/download-artifact@v4
        with:
          name: kcov-tools-image
          path: /tmp
      - name: load kcov-tools image
        run: docker load -i /tmp/kcov-tools.tar
      - name: set up just
        uses: extractions/setup-just@v3
      - name: download coverage shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-shard-*
          path: coverage
      - name: merge shards + coverage gate (enforce on full matrix, else report-only)
        env:
          COVERAGE_ENFORCE: ${{ needs.discover.outputs.full }}
        run: |
          TEST_TOOLS_PREBUILT=1 KCOV_TOOLS_PREBUILT=1 \
            just -f justfile.ci coverage-merge
      - name: upload merged coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/merged/
          if-no-files-found: ignore
          retention-days: 14

  # ── Aggregator (single check for required_status_checks) ───────────────────
  # docker_harness pattern: ci-passed depends on all real jobs so the
  # ruleset can require a single name and still cover the whole matrix.
  # We expose individual job names AND ci-passed so the ruleset can pick
  # either approach (#3 will decide).
  ci-passed:
    name: ci-passed
    needs:
      - changes
      - discover
      - build-image
      - build-kcov-image
      - lint
      - test-unit-core
      - test-unit-module
      - test-integration
      - coverage
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: assert all upstream jobs passed (or skipped on doc-only)
        run: |
          set -euo pipefail
          echo "changes.code=${{ needs.changes.outputs.code }}"
          echo "discover.modules=${{ needs.discover.outputs.modules }}"
          echo "discover.core=${{ needs.discover.outputs.core }}"
          echo "discover.full=${{ needs.discover.outputs.full }}"
          echo "changes=${{ needs.changes.result }}"
          echo "discover=${{ needs.discover.result }}"
          echo "build-image=${{ needs.build-image.result }}"
          echo "build-kcov-image=${{ needs.build-kcov-image.result }}"
          echo "lint=${{ needs.lint.result }}"
          echo "test-unit-core=${{ needs.test-unit-core.result }}"
          echo "test-unit-module=${{ needs.test-unit-module.result }}"
          echo "test-integration=${{ needs.test-integration.result }}"
          echo "coverage=${{ needs.coverage.result }}"
          # changes + discover + build-image + lint must succeed; the
          # heavy jobs must succeed-or-skipped (doc-only PRs skip all of
          # them; module-scoped PRs skip the shards for unchanged
          # modules / core). test-unit-module is the MATRIX AGGREGATE:
          # any failed shard makes it `failure`, all-shards-skipped (or
          # empty matrix) makes it `skipped`. test-integration is
          # likewise a matrix aggregate over the ubuntu:22.04 / 24.04 /
          # 26.04 Docker image shards (issue #29, AC-3 / AC-18): any
          # failed shard — 26.04 included, no continue-on-error — fails
          # the aggregate, so requiring ci-passed covers all three
          # shards. coverage is the kcov MERGE
          # job (issue #28): it asserts the ratchet coverage gate on the
          # merged shard results — enforced on full-matrix runs only,
          # report-only on narrow PR matrices — and is skipped on
          # doc-only PRs like the rest.
          for r in \
              "${{ needs.changes.result }}" \
              "${{ needs.discover.result }}" \
              "${{ needs.build-image.result }}" \
              "${{ needs.build-kcov-image.result }}" \
              "${{ needs.lint.result }}"; do
            case "$r" in success) ;; *) echo "mandatory job=$r"; exit 1 ;; esac
          done
          for r in \
              "${{ needs.test-unit-core.result }}" \
              "${{ needs.test-unit-module.result }}" \
              "${{ needs.test-integration.result }}" \
              "${{ needs.coverage.result }}"; do
            case "$r" in success|skipped) ;; *) echo "heavy job=$r"; exit 1 ;; esac
          done
