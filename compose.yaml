# compose.yaml — Docker Compose for init_ubuntu test runner
#
# Borrowed from ycpss91255-docker/base v0.28.0 (commit ade915a) compose.yaml
# Customizations vs upstream:
#   - Image comes from $TEST_TOOLS_IMAGE — the content-keyed tag
#     test-tools:<sha256(Dockerfile.test-tools) first 12> resolved by
#     script/ci/resolve_test_tools_tag.sh and exported by justfile.ci /
#     ci.sh (issue #113: parallel worktrees clobbered a single shared
#     tag). Fallback `test-tools:local` is the alias `just -f justfile.ci
#     build-test-tools` re-points on every build, so plain
#     `docker compose run` keeps working in single-worktree setups. We
#     don't publish this repo's image to ghcr (PRD §2 Non-Goals)
#   - Removed `ci-behavioural` service (no Docker image build/publish tests)
#   - Kept the separate `coverage` service backed by kcov/kcov debian image:
#     kcov is not in alpine main/community/edge/testing (2026-05), so
#     test-tools:local can't bundle it. This mirrors base's split image
#     strategy — fast lint/bats in alpine, slow coverage in debian.

services:
  # Fast CI: ShellCheck + fish syntax + Hadolint + Bats (+ Kcov if $COVERAGE=1).
  # Image is built locally by `just -f justfile.ci build-test-tools` under the
  # content-keyed tag (issue #113), so it's reproducible without
  # depending on an upstream registry and parallel worktrees with
  # different Dockerfile contents don't clobber each other.
  ci:
    image: ${TEST_TOOLS_IMAGE:-test-tools:local}
    security_opt:
      # kcov needs to attach via ptrace; alpine default seccomp blocks it.
      - seccomp=unconfined
    volumes:
      - .:/source
    working_dir: /source
    environment:
      # Forwarded by ci.sh `_run_in_container` so kcov output ownership
      # matches the host user (otherwise root-owned files block git diff).
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
      # COVERAGE=1 switches the in-container `--ci` path to run kcov.
      - COVERAGE=${COVERAGE:-0}
    entrypoint: /bin/bash
    # Default to full pipeline. Override per-target via `-c` from
    # script/ci/ci.sh `_run_in_container`:
    #   command: ["-c", "./script/ci/ci.sh --ci-lint"]   (lint only)
    #   command: ["-c", "./script/ci/ci.sh --ci-unit"]   (bats unit only)
    #   etc.
    command:
      - -c
      - ./script/ci/ci.sh --ci

  # Coverage: kcov instrumentation wraps bats. Defaults to the content-keyed
  # kcov-tools image (issue #226) — the upstream kcov/kcov debian base with
  # the bats toolchain baked in (dockerfile/Dockerfile.kcov-tools) — so
  # ci.sh `_install_deps_for_coverage` early-returns via `command -v bats`
  # instead of apt-installing on every shard. $KCOV_TOOLS_IMAGE is resolved
  # by script/ci/resolve_kcov_tools_tag.sh and exported by justfile.ci /
  # ci.sh (same content-keyed pattern as test-tools, issue #113). The
  # fallback `kcov/kcov` still works (ci.sh then apt-installs the toolchain
  # on demand) — kcov is not in any alpine repo (main / community / edge /
  # testing) as of 2026-05, hence the separate debian image.
  coverage:
    image: ${KCOV_TOOLS_IMAGE:-kcov/kcov}
    security_opt:
      - seccomp=unconfined
    volumes:
      - .:/source
    working_dir: /source
    environment:
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
      # Override deb.debian.org if your network can't reach it (regional
      # outage / captive portal); ci.sh rewrites sources.list before apt.
      - APT_MIRROR_DEBIAN=${APT_MIRROR_DEBIAN:-deb.debian.org}
    entrypoint: /bin/bash
    command:
      - -c
      - COVERAGE=1 ./script/ci/ci.sh --ci

  # Sync E2E receiver (AC-15, issue #67): the "other machine" of
  # `setup_ubuntu sync user@host`. An sshd container on the same compose
  # network as `ci`, reachable as host `sync-receiver`. Profile-gated so
  # plain `up` / `run ci` never starts it — only `just -f justfile.ci test-integration`
  # (script/ci/ci.sh --integration-only) brings it up, runs the suite with
  # SYNC_E2E=1, and tears it down. test/integration/sync/receiver-entry.sh
  # provisions host keys, the key-only `syncuser`, the e2e-probe fixture
  # module and a `setup_ubuntu` wrapper, then execs sshd in the foreground.
  sync-receiver:
    image: ${TEST_TOOLS_IMAGE:-test-tools:local}
    profiles:
      - sync-e2e
    volumes:
      - .:/source
    working_dir: /source
    entrypoint: /bin/bash
    command:
      - -c
      - ./test/integration/sync/receiver-entry.sh
